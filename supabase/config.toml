# Configuración de Supabase para el proyecto

[api]
enabled = true
port = 54321
schemas = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[functions.send-expiration-emails]
verify_jwt = false

[functions.cron-check-subscriptions]
verify_jwt = false

[functions.mp-create-subscription]
verify_jwt = false

[functions.mp-get-subscription-status]
verify_jwt = false

[functions.mp-manage-subscription]
verify_jwt = false

[functions.delete-account]
verify_jwt = false

[functions.webhook-mercadopago]
verify_jwt = false

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/app/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "60s"

[auth.email.template.confirmation]
subject = "Confirmá tu email - Escuela Segura"
content_path = "./supabase/templates/confirmation.html"
